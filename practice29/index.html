<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>29</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
</head>
<style>
a {
    background-color: rgb(251, 190, 105);
    font-size: 15px;
    color: black;
    text-decoration: none;
    border: none;
    border-radius: 10px;
    padding: 10px;
    margin: 3px;
}

.container {
    width: 90vw;
    padding: 10px;
}
.form-control {
    margin-bottom: 10px;
}
.btn-default {
    padding: 6px 11px;
    background-color: white;
    border: 2px solid rgb(168, 168, 168);
    border-radius: 5px;
}
.badge {
    color: white;
    background-color: gray;
    border-radius: 20px;
    padding: 3px 8px;
}

</style>
<body>
    <h4>exercise 29</h4>
    <div class="container">
        <h1 class="jumbotron">My First Bootstrap Page</h1>
        <p style="margin-bottom: 5px;">Input:</p>
        <input type="text" class="form-control">
        <div class="alert alert-success">Successful alert</div>
        <button class="btn btn-default">Button</button>
        <span class="badge">badge</span>
    </div>
    <br><br><br>
    <p style="margin-left: 15px;">我試過的版本裡面都沒有 btn-default 這個 class，所以原本長得跟題目要求不一樣。</p>
    <p style="margin-left: 15px;">badge 這個 class 長的也跟題目顯示的不一樣。</p>
    <p style="margin-left: 15px;">不知道是不是 bootstrap 版本沒有選對的問題，但是我自己有新增一些裝飾讓他看起來比較像一點</p>
    <a href="../index.html">回首頁</a>

</body>
</html>
