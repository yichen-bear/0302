<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>27</title>
</head>
<style>
a {
    background-color: rgb(251, 190, 105);
    font-size: 15px;
    color: black;
    text-decoration: none;
    border: none;
    border-radius: 10px;
    padding: 10px;
    margin: 3px;
}

.top {
    width: 100%;
    height: 40%;
    background-color: rgb(191, 220, 96);
}

.middle {
    margin-top: 15px;
    display: flex;
    flex-wrap: wrap;
    width: 100%;
    height: 35%;
    gap: 15px;
}

.middlebox {
    flex: 1;
    background-color: rgb(93, 194, 231);
}

.bottom {
    margin-top: 15px;
    display: flex;
    flex-wrap: wrap;
    width: 100%;
    height: 25%;
    gap: 15px;
}

.bottombox {
    flex: 1;
    background-color: rgb(184, 184, 184);
}

@media (max-width: 480px) {
    .top {
        height: 30%;
    }
    .middle {
        height: 45%;
    }
    .middlebox {
        min-width: 100%;
    }
    .bottombox {
        min-width: 45%;
    }
}

</style>
<body>
    <h4>exercise 27</h4>
    <div style="height: 500px; width: 95vw; justify-self: center;">
        <div class="top"></div>
        <div class="middle">
            <div class="middlebox"></div>
            <div class="middlebox"></div>
            <div class="middlebox"></div>
        </div>
        <div class="bottom">
            <div class="bottombox"></div>
            <div class="bottombox"></div>
            <div class="bottombox"></div>
            <div class="bottombox"></div>
        </div>
    </div>
    <br><br><br>
    <a href="../index.html">回首頁</a>

</body>
</html>
