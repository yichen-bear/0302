<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>20</title>
</head>
<style>
a {
    background-color: rgb(251, 190, 105);
    font-size: 15px;
    color: black;
    text-decoration: none;
    border: none;
    border-radius: 10px;
    padding: 10px;
    margin: 3px;
}

table, td, th{
    border: 1px solid black;
}

table {
    border-collapse: collapse;
    width: 30%;
}

th {
    height: 30px;
    text-align: left;
    padding-left: 10px;
}

div.fixed {
    position: fixed;
    top: 10px;
    right: 10px;
    width: 100px;
    height: 100px;
    border: 3px solid #73AD21;
}

</style>
<body>
    <h4>exercise 20</h4>
    <table>
        <tr style="background-color: gray; font-weight: bold; color: aliceblue;">
            <th>Firstname</th>
            <th>Lastname</th>
        </tr>
        <tr style="background-color: yellow;">
            <th>1</th>
            <th>1</th>
        </tr>
        <tr>
            <th>2</th>
            <th>2</th>
        </tr>
        <tr style="background-color: yellow;">
            <th>3</th>
            <th>3</th>
        </tr>
    </table>
    
    <div class="fixed">This div element has position: fixed;</div>

    <br><br>
    <a href="../index.html">回首頁</a>

</html>
